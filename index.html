<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>坦克大战小游戏</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <div class="panel">
        <h1>坦克大战</h1>
        <div class="info">
          <p>关卡：<span id="stage">1-1</span></p>
          <p>分数：<span id="score">0</span></p>
          <p>生命：<span id="lives">3</span></p>
          <p>敌人：<span id="enemies">0</span></p>
        </div>
        <div class="tips">
          <p>操作：WASD/方向键移动，空格发射</p>
          <p id="status">按下“开始游戏”</p>
        </div>

        <div class="auth-box">
          <p>账号：<span id="userName">未登录</span></p>
          <div class="auth-actions">
            <button id="registerBtn" class="mini-btn">注册</button>
            <button id="loginBtn" class="mini-btn">登录</button>
            <button id="logoutBtn" class="mini-btn danger">退出</button>
          </div>
        </div>

        <button id="startBtn">开始游戏</button>

        <div class="leaderboard">
          <h3>全服排行榜</h3>
          <ol id="leaderboardList"></ol>
        </div>
      </div>
      <canvas id="game" width="800" height="520"></canvas>
    </div>

    <div class="mobile-controls" aria-label="手机操作按钮">
      <div class="dpad">
        <button class="ctrl-btn" data-key="up" aria-label="上">↑</button>
        <div class="dpad-mid">
          <button class="ctrl-btn" data-key="left" aria-label="左">←</button>
          <button class="ctrl-btn" data-key="down" aria-label="下">↓</button>
          <button class="ctrl-btn" data-key="right" aria-label="右">→</button>
        </div>
      </div>
      <button class="ctrl-btn fire-btn" data-action="fire" aria-label="发射">开火</button>
    </div>

    <script src="./game/app.js"></script>
    <script src="./game/api.js"></script>
    <script src="./game/levels.js"></script>
    <script src="./game/logic.js"></script>
    <script src="./game/render.js"></script>
    <script src="./game/input.js"></script>
    <script src="./game.js"></script>
  </body>
</html>
